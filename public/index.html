<!DOCTYPE html>
<html lang="ar,en">
<head> <meta charset="UTF-8"> <title>Interactive Music Generation Game</title> <style> :root { --primary: #64ffda; --secondary: #4dffe9; --background: #2a2a2a; } body { font-family: 'Noto Sans Arabic', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; background-color: var(--background); color: white; } .container { max-width: 800px; padding: 2rem; } h1 { text-align: center; font-family: 'Inter', sans-serif; animation: fadeIn 1s ease-in; } .canvas-container { position: relative; width: 100%; max-width: 600px; margin: 2rem auto; } canvas { display: block; border-radius: 10px; background-color: rgba(255, 255, 255, 0.1); } .controls { display: flex; gap: 1rem; justify-content: center; margin-top: 2rem; } button { padding: 0.8rem 1.5rem; border: none; border-radius: 5px; background-color: var(--primary); color: white; cursor: pointer; transition: all 0.3s ease; } button:hover { transform: scale(1.05); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2); } .slider-container { display: flex; align-items: center; gap: 0.5rem; } input[type="range"] { width: 100%; height: 4px; -webkit-appearance: none; appearance: none; background-color: var(--primary); border-radius: 2px; } @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } .progress-bar { width: 100%; height: 4px; background-color: rgba(255, 255, 255, 0.2); border-radius: 2px; margin-top: 1rem; } </style>
</head>
<body> <section lang="ar"> <h2>لعبة إنشاء الموسيقى التفاعلية</h2> <p>سجل صوتك وشاهِد كيف تتحول إلى موسيقى!</p> <p>استخدم المزلاجات للتعديل على الصوت:</p> </section> <section lang="en"> <h2>Interactive Music Generation Game</h2> <p>Record your voice and watch it transform into music!</p> <p>Use the sliders to adjust sound effects:</p> </section> <canvas id="waveform"></canvas> <div class="controls"> <button onclick="toggleRecording()">سجل الصوت</button> <button onclick="playback()">تشغيل</button> <button onclick="clearAudio()">مسح</button> </div> <div class="slider-container"> <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5"> <input type="range" id="effect" min="0" max="2" step="1" value="1"> </div> <div class="progress-bar" id="progressBar"></div> <script> let audioContext = new (window.AudioContext || window.webkitAudioContext)(); let mediaRecorder; let recordedChunks = []; async function initAudio() { try { const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); mediaRecorder = new MediaRecorder(stream); mediaRecorder.ondataavailable = (event) => { recordedChunks.push(event.data); }; mediaRecorder.onstop = () => { const audioBlob = new Blob(recordedChunks, { type: 'audio/wav' }); const audioUrl = URL.createObjectURL(audioBlob); // Add your audio processing logic here }; } catch (err) { console.error('Error accessing microphone:', err); } } function toggleRecording() { if (mediaRecorder && !mediaRecorder.recording) { mediaRecorder.start(); } } function stopRecording() { mediaRecorder?.stop(); } function playBack() { // Add your playback logic here } function clearAudio() { recordedChunks = []; } // Waveform visualization const canvas = document.getElementById('waveform'); const ctx = canvas.getContext('2d'); let animationFrameId; let isDrawing = false; canvas.addEventListener('mousedown', () => { isDrawing = true; }); canvas.addEventListener('mousemove', (e) => { if (!isDrawing) return; draw(ctx, e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop); }); canvas.addEventListener('mouseup', () => { isDrawing = false; }); function draw(ctx, x, y) { ctx.fillStyle = `hsl(${(Math.sin(Date.now() * 0.001)) * 127 + 128}, 64%, 50%)`; ctx.fillRect(x - 3, y - 3, 6, 6); } function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); drawWave(); animationFrameId = requestAnimationFrame(animate); } function drawWave() { const centerX = canvas.width / 2; const centerY = canvas.height / 2; ctx.beginPath(); ctx.moveTo(centerX - canvas.width, centerY); for (let x = centerX - canvas.width; x <= centerX + canvas.width; x += 5) { const y = centerY + Math.sin(x * 0.05 + Date.now() * 0.001) * 30 + Math.sin(x * 0.1 + Date.now() * 0.002) * 20; ctx.lineTo(x, y); } ctx.strokeStyle = '#64ffda'; ctx.lineWidth = 2; ctx.stroke(); } // Control handling document.getElementById('volume').addEventListener('input', (e) => { // Add volume control logic here }); document.getElementById('effect').addEventListener('input', (e) => { // Add effect control logic here }); initAudio(); animate(); window.addEventListener('beforeunload', () => { if (animationFrameId) { cancelAnimationFrame(animationFrameId); } }); </script>
</body>
</html>
